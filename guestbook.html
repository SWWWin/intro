<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>함께 성장하는 심수민 | Guestbook</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        cream: { 50: '#FFFDF9', 100: '#FFF9ED', 200: '#FFF3DB' },
                        orange: { 50: '#FFF5ED', 100: '#FFE6D3', 500: '#FF6F22', 600: '#E05613' },
                        charcoal: '#2D3134'
                    }
                }
            }
        };
    </script>
</head>
<body class="bg-cream-50 min-h-screen flex flex-col justify-between pt-24 font-['Noto_Sans_KR']">

    <!-- NAVBAR -->
<nav id="navbar" class="fixed top-0 left-0 w-full z-50 bg-white/80 backdrop-blur-md border-b border-cream-200 py-4 px-6 flex justify-between items-center shadow-sm transition-all duration-300">

    <!-- Logo -->
    <a href="index.html" class="text-lg font-black text-orange-500 tracking-tight flex items-center gap-1.5">
        <span class="w-2.5 h-2.5 rounded-full bg-orange-500 animate-pulse"></span>
        Sumin.SIM
    </a>

    <!-- Desktop Menu -->
    <div class="hidden md:flex items-center space-x-6 text-sm font-semibold">
        <a href="index.html" class="text-gray-500 hover:text-orange-500 transition-all">
            홈
        </a>

        <a href="about.html" class="text-gray-500 hover:text-orange-500 transition-all">
            소개 & 키워드
        </a>

        <a href="hobby.html" class="text-gray-500 hover:text-orange-500 transition-all">
    취미
</a>

<a href="guestbook.html" class="text-orange-500 border-b-2 border-orange-500 pb-1">
    방명록
</a>
    </div>

    <!-- Mobile Menu Button -->
    <button id="menu-btn"
        class="md:hidden text-charcoal hover:text-orange-500"
        aria-label="메뉴 열기">
        <i data-lucide="menu" class="w-6 h-6"></i>
    </button>

    <!-- Mobile Menu -->
    <div id="mobile-menu"
        class="hidden absolute top-full left-0 w-full bg-white border-b border-cream-200 py-4 px-6 flex flex-col space-y-3 shadow-md md:hidden">

        <a href="index.html"
            class="mobile-link text-gray-600 hover:text-orange-500 font-semibold">
            홈
        </a>

        <a href="about.html"
            class="mobile-link text-gray-600 hover:text-orange-500 font-semibold">
            소개 & 키워드
        </a>

        <a href="hobby.html" class="text-gray-500 hover:text-orange-500 transition-all">
    취미
</a>

<a href="guestbook.html" class="text-orange-500 border-b-2 border-orange-500 pb-1">
    방명록
</a>
    </div>

</nav>

    <main class="max-w-3xl mx-auto px-6 py-12 flex-grow">
        <div class="text-center mb-10">
            <h2 class="text-3xl font-black text-charcoal">따뜻한 한 마디</h2>
            <p class="text-gray-500 mt-2">수민이와 함께한 소중한 순간이나 응원을 남겨주세요!</p>
        </div>

        <!-- 방명록 작성 폼 -->
        <div class="bg-white p-6 rounded-3xl border border-cream-200 shadow-sm mb-10">
            <div class="flex flex-col gap-4">
                <input type="text" id="guest-name" placeholder="이름" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:border-orange-500 transition-all">
                <textarea id="guest-msg" placeholder="따뜻한 응원 한 마디를 남겨주세요!" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:border-orange-500 transition-all h-24 resize-none"></textarea>
                <button onclick="addMessage()" class="w-full py-3 bg-orange-500 text-white font-bold rounded-xl hover:bg-orange-600 transition-all shadow-lg shadow-orange-500/20">
                    남기기
                </button>
            </div>
        </div>

        
    </main>

    <script>
        lucide.createIcons();
        function addMessage() {
            const name = document.getElementById('guest-name').value;
            const msg = document.getElementById('guest-msg').value;
            if(!name || !msg) return alert('내용을 모두 입력해주세요!');
            
            const list = document.getElementById('message-list');
            const date = new Date().toLocaleDateString();
            
            const item = document.createElement('div');
            item.className = 'bg-white p-5 rounded-2xl border border-cream-100 shadow-sm animate-fadeIn';
            item.innerHTML = `
                <div class="flex justify-between items-center mb-2">
                    <span class="font-bold text-orange-500 text-sm">${name}</span>
                    <span class="text-[10px] text-gray-400">${date}</span>
                </div>
                <p class="text-gray-600 text-sm">${msg}</p>
            `;
            list.prepend(item);
            document.getElementById('guest-name').value = '';
            document.getElementById('guest-msg').value = '';
        }
    </script>

    <footer class="bg-charcoal text-white py-8 text-center text-xs">
        <p class="text-cream-200 font-medium">"SSAFY 최고의 긍정 메이트 심수민을 응원해 주세요!"</p>
        <p class="text-gray-500 mt-2">&copy; 2026 Sumin Sim. All Rights Reserved.</p>
    </footer>

    <script>lucide.createIcons();</script>
</body>
</html>
